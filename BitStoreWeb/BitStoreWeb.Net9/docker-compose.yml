services:
  mysql:
    image: mysql:8.4
    container_name: bitstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bitstore
      MYSQL_USER: bitstore
      MYSQL_PASSWORD: bitstore_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - bitstore_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  bitstore_mysql_data:
